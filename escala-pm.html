<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2744">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Escala PM">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Escala PM</title>
  <style>
    :root {
      --bg:        #08101f;
      --surface:   #111c33;
      --card:      #162040;
      --border:    #1e3060;
      --pm:        #4da6ff;
      --pm-glow:   #1e7de055;
      --dejem:      #e0801e;
      --dejem-glow: #e0801e40;
      --deleg:     #9b1ee0;
      --deleg-glow:#9b1ee040;
      --folga:     #1ead6e;
      --folga-glow:#1ead6e30;
      --text:      #e8edf8;
      --muted:     #6b7fa8;
      --today:     #f0c040;
      --radius:    12px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--pm);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .logo-text span { color: var(--pm); }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .month-nav button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .month-nav button:active { opacity: 0.7; }
    #monthLabel {
      font-size: 15px;
      font-weight: 600;
      min-width: 130px;
      text-align: center;
      text-transform: capitalize;
    }

    /* STATS BAR */
    .stats {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .stats::-webkit-scrollbar { display: none; }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
      font-size: 12px;
      flex-shrink: 0;
    }
    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .stat-pill .count { font-weight: 700; font-size: 13px; }

    /* CALENDAR */
    .calendar-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 0;
      scrollbar-width: none;
    }
    .calendar-wrap::-webkit-scrollbar { display: none; }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
    }
    .weekday {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      padding: 4px 0;
    }
    .weekday.sun { color: #e05050; }
    .weekday.sat { color: #5090e0; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .day {
      aspect-ratio: 1;
      border-radius: var(--radius);
      border: 1.5px solid transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
      background: var(--card);
      min-width: 0;
    }
    .day:active { transform: scale(0.92); }
    .day.empty { background: transparent; cursor: default; border-color: transparent; }
    .day.today { border-color: var(--today) !important; }
    .day-num {
      font-size: 15px;
      font-weight: 600;
      line-height: 1;
    }
    .day-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 2px;
      text-transform: uppercase;
    }
    .day.sunday .day-num { color: #e07070; }
    .day.saturday .day-num { color: #7090e0; }
    .day.past { opacity: 0.45; }

    /* Tipo PM */
    .day.tipo-pm {
      background: linear-gradient(135deg, #1a3a6e 0%, #0f2550 100%);
      border-color: #4da6ff;
      border-width: 2px;
      box-shadow: 0 0 8px #4da6ff33;
    }
    .day.tipo-pm .day-num { color: #ffffff; }
    .day.tipo-pm .day-label { color: #4da6ff; font-weight: 800; font-size: 9px; }

    /* Tipo DEJEM */
    .day.tipo-dejem {
      background: var(--dejem-glow);
      border-color: var(--dejem);
    }
    .day.tipo-dejem .day-label { color: var(--dejem); }

    /* Tipo Delegada */
    .day.tipo-deleg {
      background: var(--deleg-glow);
      border-color: var(--deleg);
    }
    .day.tipo-deleg .day-label { color: var(--deleg); }

    /* Folga automática - bem discreta */
    .day.tipo-folga-auto {
      background: #0a1a10;
      border-color: #0f2e18;
    }
    .day.tipo-folga-auto .day-num { color: #3a6b4a; }
    .day.tipo-folga-auto .day-label { display: block; color: #2a4a34; font-size: 8px; }

    /* Folga Especial (manual) */
    .day.tipo-folga {
      background: var(--folga-glow);
      border-color: var(--folga);
    }
    .day.tipo-folga .day-label { color: var(--folga); }

    /* BOTTOM NAV */
    .bottom-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px 10px;
      flex-shrink: 0;
    }
    .legend {
      display: flex;
      justify-content: space-around;
      margin-bottom: 10px;
    }
    .legend-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 2px solid;
    }

    /* MODAL */
    .overlay {
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 20px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(.25,.8,.25,1);
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
    }
    .modal-scroll {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .modal-footer {
      flex-shrink: 0;
      padding-top: 10px;
    }
    .overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }
    .modal-date {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 20px;
      text-transform: capitalize;
    }
    .tipo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .tipo-btn {
      padding: 14px 10px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .tipo-btn .icon { font-size: 22px; }
    .tipo-btn:active { transform: scale(0.96); }
    .tipo-btn.selected-pm    { border-color: var(--pm);    background: var(--pm-glow);    }
    .tipo-btn.selected-dejem  { border-color: var(--dejem);  background: var(--dejem-glow);  }
    .tipo-btn.selected-deleg { border-color: var(--deleg); background: var(--deleg-glow); }
    .tipo-btn.selected-folga { border-color: var(--folga); background: var(--folga-glow); }
    .tipo-btn.selected-folga_normal { border-color: #2d7a4a; background: #0d2a1a; }
    .tipo-btn.selected-folga_esp    { border-color: var(--folga); background: var(--folga-glow); }
    .tipo-btn.selected-medico   { border-color: #e05555; background: #1a0f0f; }
    .tipo-btn.selected-casa     { border-color: #e0a020; background: #1a140a; }
    .tipo-btn.selected-trabalho { border-color: #20c0e0; background: #0f1a2a; }
    .tipo-btn.selected-evento   { border-color: #c084fc; background: #1a0f1a; }

    .obs-field {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      padding: 10px 12px;
      resize: none;
      margin-bottom: 10px;
    }
    .obs-field:focus { outline: none; border-color: var(--pm); }
    .obs-field::placeholder { color: var(--muted); }

    .extra-fields {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }
    .extra-fields.visible { display: flex; flex-direction: column; }
    .extra-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .extra-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      padding: 10px 12px;
    }
    .extra-input:focus { outline: none; border-color: var(--djem); }
    .extra-input::placeholder { color: var(--muted); }
    .extra-row { display: flex; gap: 8px; }
    .extra-row .extra-group { flex: 1; }

    .modal-actions {
      display: flex;
      gap: 8px;
    }
    .btn-save {
      flex: 1;
      padding: 14px;
      background: var(--pm);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-save:active { opacity: 0.8; }
    .btn-clear {
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
    }
    .btn-clear:active { opacity: 0.7; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1ead6e;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Médico */
    .day.tipo-medico {
      background: #1a0f0f;
      border-color: #e05555;
      border-width: 2px;
    }
    .day.tipo-medico .day-num { color: #fff; }
    .day.tipo-medico .day-label { color: #e05555; font-weight: 800; font-size: 9px; }

    /* Casa */
    .day.tipo-casa {
      background: #1a140a;
      border-color: #e0a020;
      border-width: 2px;
    }
    .day.tipo-casa .day-num { color: #fff; }
    .day.tipo-casa .day-label { color: #e0a020; font-weight: 800; font-size: 9px; }

    /* Trabalho Joyce */
    .day.tipo-trabalho {
      background: #0f1a2a;
      border-color: #20c0e0;
      border-width: 2px;
    }
    .day.tipo-trabalho .day-num { color: #fff; }
    .day.tipo-trabalho .day-label { color: #20c0e0; font-weight: 800; font-size: 9px; }

    /* Evento */
    .day.tipo-evento {
      background: #1a0f1a;
      border-color: #c084fc;
      border-width: 2px;
    }
    .day.tipo-evento .day-num { color: #fff; }
    .day.tipo-evento .day-label { color: #c084fc; font-weight: 800; font-size: 9px; }

    /* OBS indicator */
    .obs-dot {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 5px;
      height: 5px;
      background: var(--today);
      border-radius: 50%;
    }
    /* Férias */
    .day.tipo-ferias {
      background: linear-gradient(135deg, #1a3a1a, #0f2a0f);
      border-color: #4caf50;
      border-width: 2px;
    }
    .day.tipo-ferias .day-num { color: #fff; }
    .day.tipo-ferias .day-label { color: #4caf50; font-weight: 800; }
    .tipo-btn.selected-ferias { border-color: #4caf50; background: #0f2a0f; }
    /* Multi eventos */
    .day-labels { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .day-label-item { font-size: 7px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; line-height: 1; }
    /* Horário no card */
    .day-time {
      font-size: 8px;
      color: var(--muted);
      line-height: 1;
      margin-top: 1px;
    }
    .day.tipo-dejem .day-time  { color: var(--djem); }
    .day.tipo-deleg .day-time  { color: var(--deleg); }
  </style>
</head>
<body>

<!-- TELA DE SELEÇÃO DE USUÁRIO -->
<div id="userSelectOverlay" style="position:fixed;inset:0;background:#08101f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:20px;">
  <div style="font-size:48px;margin-bottom:8px;">🛡️</div>
  <div style="font-size:24px;font-weight:800;color:#e8edf8;letter-spacing:0.5px;">Escala PM</div>
  <div style="font-size:14px;color:#6b7fa8;margin-bottom:16px;">Quem está acessando?</div>
  <button onclick="escolherUsuario('felipe')" style="width:100%;max-width:280px;padding:18px;background:linear-gradient(135deg,#1a3a6e,#0f2550);border:2px solid #4da6ff;border-radius:16px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;">
    <span style="font-size:28px;">👮</span> Felipe
  </button>
  <button onclick="escolherUsuario('joyce')" style="width:100%;max-width:280px;padding:18px;background:linear-gradient(135deg,#2a1a3a,#1a0f30);border:2px solid #c084fc;border-radius:16px;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;">
    <span style="font-size:28px;">💙</span> Joyce
  </button>
  <div style="font-size:11px;color:#3a4a6a;margin-top:8px;">Sua escolha será lembrada neste aparelho</div>
</div>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">Escala <span>PM</span> <span id="userBadge" style="font-size:12px;background:#1e3060;border-radius:6px;padding:2px 6px;margin-left:4px;"></span></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="syncStatus" style="font-size:11px;color:var(--muted);"></span>
      <button onclick="syncFromRemote()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;font-size:13px;cursor:pointer;" title="Sincronizar">🔄</button>
      <button onclick="trocarUsuario()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:8px;font-size:13px;cursor:pointer;" title="Trocar usuário">👤</button>
    </div>
    <div class="month-nav">
      <button id="prevMonth">&#8249;</button>
      <div id="monthLabel"></div>
      <button id="nextMonth">&#8250;</button>
    </div>
  </div>
  <div class="stats" id="statsBar"></div>
</header>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday sun">Dom</div>
    <div class="weekday">Seg</div>
    <div class="weekday">Ter</div>
    <div class="weekday">Qua</div>
    <div class="weekday">Qui</div>
    <div class="weekday">Sex</div>
    <div class="weekday sat">Sáb</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<div class="bottom-bar">

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="border-color:var(--pm);background:var(--pm-glow)"></div>
      Serviço PM
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="border-color:var(--dejem);background:var(--dejem-glow)"></div>
      DEJEM
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="border-color:var(--deleg);background:var(--deleg-glow)"></div>
      Delegada
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="border-color:var(--folga);background:var(--folga-glow)"></div>
      Folga Esp.
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-handle" style="flex-shrink:0;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-shrink:0;">
      <div class="modal-title" id="modalTitle" style="margin-bottom:0;"></div>
      <button onclick="closeModal()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;line-height:1;flex-shrink:0;">✕</button>
    </div>
    <div class="modal-date" id="modalDate" style="flex-shrink:0;"></div>
    <div class="modal-scroll">

    <!-- Lista de eventos já no dia -->
    <div id="eventosList" style="margin-bottom:8px;"></div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;">➕ Adicionar</div>
      <button onclick="openFeriasModal()" style="background:#0f2a0f;border:1px solid #4caf50;color:#4caf50;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">🏖️ Férias por período</button>
    </div>
    <div class="tipo-grid" style="margin-bottom:12px;">
      <button class="tipo-btn" data-tipo="pm" onclick="selectTipo('pm')">
        <span class="icon">🛡️</span>Serviço PM
      </button>
      <button class="tipo-btn" data-tipo="dejem" onclick="selectTipo('dejem')">
        <span class="icon">🚑</span>DEJEM
      </button>
      <button class="tipo-btn" data-tipo="deleg" onclick="selectTipo('deleg')">
        <span class="icon">🚔</span>Delegada
      </button>
      <button class="tipo-btn" data-tipo="folga_normal" onclick="selectTipo('folga_normal')">
        <span class="icon">😴</span>Folga
      </button>
      <button class="tipo-btn" data-tipo="ferias" onclick="selectTipo('ferias')">
        <span class="icon">🏖️</span>Férias
      </button>
      <button class="tipo-btn" data-tipo="folga_esp" onclick="selectTipo('folga_esp')">
        <span class="icon">🌴</span>Folga Esp.
      </button>
    </div>

    <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">📅 Compromissos</div>
    <div class="tipo-grid" style="margin-bottom:10px;">
      <button class="tipo-btn" data-tipo="medico" onclick="selectTipo('medico')">
        <span class="icon">🏥</span>Médico
      </button>
      <button class="tipo-btn" data-tipo="trabalho" onclick="selectTipo('trabalho')">
        <span class="icon">💼</span>Trabalho

// Salvar um dia específico no Supabase
async function saveDayRemote(key, entry) {
  const hdrs = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  try {
    // Sempre deletar primeiro (garante upsert limpo)
    await fetch(`${SUPABASE_URL}/rest/v1/escala_dias?user_id=eq.${USER_ID}&dia=eq.${key}`, {
      method: 'DELETE', headers: hdrs
    });

    if (!entry) return; // só deletar

    const eventos = entry.eventos || (entry.tipo ? [entry] : []);
    if (eventos.length === 0) return;

    const ev0 = eventos[0];
    const row = {
      user_id: USER_ID,
      dia: key,
      tipo: ev0.tipo || null,
      horario: ev0.horario || null,
      termino: ev0.termino || null,
      local: ev0.local || null,
      obs: eventos.length > 1
        ? JSON.stringify({ _eventos: eventos })
        : (ev0.obs || null),
      auto: entry.auto || false
    };

    const r = await fetch(`${SUPABASE_URL}/rest/v1/escala_dias`, {
      method: 'POST',
      headers: { ...hdrs, 'Prefer': 'return=minimal' },
      body: JSON.stringify(row)
    });

    if (!r.ok) {
      console.error('Erro POST:', r.status, await r.text());
      showSyncStatus('⚠️ Erro ao salvar', false);
    } else {
      console.log('Salvo OK:', key, ev0.tipo);
      showSyncStatus('✓ Salvo na nuvem', true);
    }
  } catch(e) {
    console.error('saveDayRemote exception:', e);
    showSyncStatus('⚠️ Sem internet', false);
  }
}

// Carregar todos os dias do Supabase e mesclar com local
async function syncFromRemote() {
  try {
    showSyncStatus('Sincronizando...');
    const res = await fetch(`${SUPABASE_URL}/rest/v1/escala_dias?user_id=eq.${USER_ID}&select=*&order=dia`, {
      headers: SB_HEADERS
    });
    if (!res.ok) { hideSyncStatus(); return; }
    const rows = await res.json();
    // Mesclar: remoto tem prioridade sobre local para dias não-auto
    rows.forEach(row => {
      if (!row.tipo) return;
      // Checar se obs tem múltiplos eventos em JSON
      let eventos;
      try {
        const parsed = row.obs ? JSON.parse(row.obs) : null;
        if (parsed && parsed._eventos) {
          eventos = parsed._eventos;
        } else {
          eventos = [{ tipo: row.tipo, horario: row.horario, termino: row.termino, local: row.local, obs: row.obs }];
        }
      } catch {
        eventos = [{ tipo: row.tipo, horario: row.horario, termino: row.termino, local: row.local, obs: row.obs }];
      }
      data[row.dia] = { eventos, auto: row.auto || false };
    });
    saveData();
    renderCalendar();
    showSyncStatus('✓ Sincronizado', true);
  } catch(e) {
    hideSyncStatus();
  }
}

function showSyncStatus(msg, success) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = success ? '#1ead6e' : 'var(--muted)';
  if (success) setTimeout(hideSyncStatus, 2500);
}
function hideSyncStatus() {
  const el = document.getElementById('syncStatus');
  if (el) el.textContent = '';
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  document.getElementById('monthLabel').textContent =
    `${MONTHS_PT[currentMonth]} ${currentYear}`;

  // empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }

  const counts = { pm: 0, dejem: 0, deleg: 0, medico: 0, trabalho: 0, casa: 0, evento: 0, folga_esp: 0 };

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const dow = date.getDay();
    const key = dayKey(currentYear, currentMonth, d);
    const entry = data[key];
    const el = document.createElement('div');
    let cls = 'day';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';

    const isToday = (d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear());
    if (isToday) cls += ' today';

    const isPast = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (isPast && !isToday) cls += ' past';

    const eventos = getDayEventos(key);
    const tipoPrincipal = eventos.length > 0 ? eventos[0].tipo : null;
    if (tipoPrincipal && TIPOS[tipoPrincipal]) cls += ` ${TIPOS[tipoPrincipal].cls}`;

    el.className = cls;
    el.innerHTML = `<span class="day-num">${d}</span>`;
    if (eventos.length > 0) {
      el.innerHTML += `<div class="day-labels">${
        eventos.map(ev => TIPOS[ev.tipo] ? `<span class="day-label-item" style="color:inherit;">${TIPOS[ev.tipo].label}</span>` : '').join('')
      }</div>`;
      const primEv = eventos[0];
      if (primEv.horario) el.innerHTML += `<span class="day-time">${primEv.horario}</span>`;
      if (eventos.some(ev => ev.obs || ev.local)) el.innerHTML += `<span class="obs-dot"></span>`;
    }
    if (entry) counts[tipoPrincipal] = (counts[tipoPrincipal] || 0) + 1;

    el.addEventListener('click', () => openModal(d));
    grid.appendChild(el);
  }

  renderStats(counts);
}

function renderStats(counts) {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = '';
  const items = [
    { tipo: 'pm',       label: 'PM',       color: 'var(--pm)'    },
    { tipo: 'dejem',    label: 'DEJEM',    color: 'var(--dejem)' },
    { tipo: 'deleg',    label: 'Delegada', color: 'var(--deleg)' },
    { tipo: 'folga_esp',label: 'F.Esp',    color: 'var(--folga)' },
    { tipo: 'medico',   label: 'Médico',   color: '#e05555'      },
    { tipo: 'trabalho', label: 'Trab.',    color: '#20c0e0'      },
    { tipo: 'casa',     label: 'Casa',     color: '#e0a020'      },
    { tipo: 'evento',   label: 'Evento',   color: '#c084fc'      },
  ];
  items.forEach(({ tipo, label, color }) => {
    const pill = document.createElement('div');
    pill.className = 'stat-pill';
    pill.innerHTML = `
      <span class="stat-dot" style="background:${color}"></span>
      <span class="count">${counts[tipo] || 0}</span>
      <span>${label}</span>
    `;
    bar.appendChild(pill);
  });
  // Total
  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  const pill = document.createElement('div');
  pill.className = 'stat-pill';
  pill.innerHTML = `<span style="color:var(--muted)">Total</span> <span class="count">${total}</span>`;
  bar.appendChild(pill);
}

  if (!container) return;
  if (eventos.length === 0) {
    container.innerHTML = '';

  }
  container.innerHTML = eventos.map((ev, i) => {
    const t = TIPOS[ev.tipo];
    const cor = getCor(ev.tipo);
    return `<div style="display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid ${cor};border-radius:8px;padding:8px 10px;margin-bottom:6px;">

          ${ev.horario ? `<div style="font-size:11px;color:var(--muted);">⏰ ${ev.horario}${ev.termino?' - '+ev.termino:''}</div>` : ''}

function getCor(tipo) {

  return cores[tipo] || 'var(--muted)';

function getEmoji(tipo) {
  const emojis = { pm:'🛡️', dejem:'🚑', deleg:'🚔', folga_esp:'🌴', ferias:'🏖️', medico:'🏥', trabalho:'💼', casa:'🏠', evento:'🎉', folga_normal:'😴' };

}

function editEvento(idx) {
  const eventos = getDayEventos(editingKey);
  const ev = eventos[idx];
  editingEventoIdx = idx;
  selectedTipo = ev.tipo;
  document.getElementById('obsField').value = ev.obs || '';
  document.getElementById('horarioField').value = ev.horario || '';
  document.getElementById('terminoField').value = ev.termino || '';
  document.getElementById('localField').value = ev.local || '';
  updateTipoBtns();
  const extra = document.getElementById('extraFields');
  if (selectedTipo && TIPOS_COM_EXTRA.includes(selectedTipo)) extra.classList.add('visible');
  else extra.classList.remove('visible');
}

function deleteEvento(idx) {
  const eventos = getDayEventos(editingKey);
  eventos.splice(idx, 1);
  if (eventos.length === 0) {
    delete data[editingKey];
  } else {
    data[editingKey] = { eventos, auto: false };
  }
  saveData();
  saveDayRemote(editingKey, data[editingKey] || null);
  renderEventosList();
  renderCalendar();
  showToast('Removido ✓');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editingKey = null;
  selectedTipo = null;
}

const TIPOS_COM_EXTRA = ['dejem','deleg','medico','trabalho','evento'];
function selectTipo(tipo) {
  selectedTipo = selectedTipo === tipo ? null : tipo;
  updateTipoBtns();
  const extra = document.getElementById('extraFields');
  if (selectedTipo && TIPOS_COM_EXTRA.includes(selectedTipo)) {
    extra.classList.add('visible');
    const localInput = document.getElementById('localField');
    const placeholders = {
      dejem:    'Ex: UPA Centro, Hospital...',
      deleg:    'Ex: 1ª Delegacia, DP Centro...',
      medico:   'Ex: UPA, Clínica, Hospital...',
      trabalho: 'Ex: Empresa, endereço...',
      evento:   'Ex: Nome do local, endereço...',
    };
    if (localInput && placeholders[selectedTipo]) localInput.placeholder = placeholders[selectedTipo];
  } else {
    extra.classList.remove('visible');
  }
}

function updateTipoBtns() {
  document.querySelectorAll('.tipo-btn').forEach(btn => {
    btn.className = 'tipo-btn';
    if (btn.dataset.tipo === selectedTipo) {
      btn.classList.add(`selected-${selectedTipo}`);
    }
  });
}

function saveDay() {
  if (!selectedTipo) { showToast('Selecione um tipo!'); return; }

  const obs     = document.getElementById('obsField').value.trim();
  const horario = document.getElementById('horarioField').value.trim();
  const termino = document.getElementById('terminoField').value.trim();
  const local   = document.getElementById('localField').value.trim();
  const isExtra = TIPOS_COM_EXTRA.includes(selectedTipo);

  const novoEvento = {
    tipo: selectedTipo,
    ...(isExtra && horario ? { horario } : {}),
    ...(isExtra && termino ? { termino } : {}),
    ...(isExtra && local   ? { local }   : {}),
    ...(obs ? { obs } : {}),
  };

  const eventos = getDayEventos(editingKey).filter(ev => !ev.auto);
  if (editingEventoIdx !== null) {
    eventos[editingEventoIdx] = novoEvento; // editar existente
  } else {
    eventos.push(novoEvento); // adicionar novo
  }

  data[editingKey] = { eventos, auto: false };
  saveData();
  saveDayRemote(editingKey, data[editingKey]);

  // Limpar campos para adicionar outro evento
  selectedTipo = null;
  editingEventoIdx = null;
  document.getElementById('obsField').value = '';
  document.getElementById('horarioField').value = '';
  document.getElementById('terminoField').value = '';
  document.getElementById('localField').value = '';
  document.getElementById('extraFields').classList.remove('visible');
  updateTipoBtns();
  renderEventosList();
  renderCalendar();
  showToast('Adicionado ✓');
}

function clearDay() {
  const key = editingKey;

  saveData();

// Faz um ping a cada 5 dias para manter o projeto ativo no plano free
async function pingSupabase() {
  try {
    const lastPing = parseInt(localStorage.getItem('escala_last_ping') || '0');
    const agora = Date.now();
    const cincoDias = 5 * 24 * 60 * 60 * 1000;
    if (agora - lastPing < cincoDias) return; // já pingou recentemente
    // Faz uma query leve só para manter ativo
    await fetch(`${SUPABASE_URL}/rest/v1/escala_dias?limit=1`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    localStorage.setItem('escala_last_ping', String(agora));
    console.log('Ping Supabase OK — projeto mantido ativo');
  } catch(e) {}
}

// REALTIME — recebe alterações na hora via WebSocket
function startRealtime() {
  const wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
  let ws;
  let heartbeat;
  let ref = 1;

  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      // Entrar no canal da tabela escala_dias
      ws.send(JSON.stringify({
        topic: 'realtime:public:escala_dias',
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' }, postgres_changes: [{ event: '*', schema: 'public', table: 'escala_dias', filter: `user_id=eq.${USER_ID}` }] } },
        ref: String(ref++)
      }));
      // Heartbeat a cada 25s para manter conexão viva
      heartbeat = setInterval(() => {
        ws.send(JSON.stringify({ topic: 'phoenix', event: 'heartbeat', payload: {}, ref: String(ref++) }));
      }, 25000);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        // Quando chega uma alteração na tabela
        if (msg.event === 'postgres_changes' || (msg.payload && msg.payload.data && msg.payload.data.type)) {
          const change = msg.payload.data || msg.payload;
          const record = change.record || change.new;
          const old_record = change.old_record || change.old;
          const eventType = change.type || change.eventType;

          if (eventType === 'DELETE' && old_record) {
            delete data[old_record.dia];
          } else if (record && record.dia) {
            const entry = {};
            if (record.tipo)    entry.tipo    = record.tipo;
            if (record.horario) entry.horario = record.horario;
            if (record.termino) entry.termino = record.termino;
            if (record.local)   entry.local   = record.local;
            if (record.obs)     entry.obs     = record.obs;
            if (record.auto)    entry.auto    = record.auto;
            if (Object.keys(entry).length) data[record.dia] = entry;
            else delete data[record.dia];
          }
          saveData();
          renderCalendar();
          showSyncStatus('✓ Atualizado', true);
        }
      } catch(err) {}
    };

    ws.onclose = () => {
      clearInterval(heartbeat);
      // Reconectar em 3 segundos se cair
      setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  connect();
}

function startAutoSync() {
  startRealtime();
}

  // Atualizar resumo ao mudar datas
  ['feriasInicio','feriasFim'].forEach(id => {
    document.getElementById(id).oninput = updateFeriasSummary;
  });
}

function updateFeriasSummary() {
  const ini = document.getElementById('feriasInicio').value;
  const fim = document.getElementById('feriasFim').value;
  if (!ini || !fim) return;
  const d1 = new Date(ini + 'T12:00:00');
  const d2 = new Date(fim + 'T12:00:00');
  if (d2 < d1) { document.getElementById('feriasSummary').textContent = '⚠️ Data fim deve ser após início'; return; }
  const dias = Math.round((d2-d1)/(1000*60*60*24)) + 1;
  document.getElementById('feriasSummary').textContent = `${dias} dia${dias>1?'s':''} de férias`;
}

function closeFeriasModal() {
  document.getElementById('overlayFerias').classList.remove('open');
}

async function salvarFerias() {
  const ini = document.getElementById('feriasInicio').value;
  const fim = document.getElementById('feriasFim').value;
  if (!ini || !fim) { showToast('Preencha as datas!'); return; }
  const d1 = new Date(ini + 'T12:00:00');
  const d2 = new Date(fim + 'T12:00:00');
  if (d2 < d1) { showToast('Data inválida!'); return; }

  let count = 0;
  const cur = new Date(d1);
  const promises = [];
  while (cur <= d2) {
    const key = cur.toISOString().slice(0,10);
    data[key] = { eventos: [{ tipo: 'ferias' }], auto: false };
    promises.push(saveDayRemote(key, data[key]));
    cur.setDate(cur.getDate() + 1);
    count++;
  }
  saveData();
  await Promise.all(promises);
  closeFeriasModal();
  closeModal();
  renderCalendar();
  showToast(`🏖️ ${count} dias de férias marcados!`);
}

// Fechar modal férias ao clicar fora
document.getElementById('overlayFerias').addEventListener('click', e => {
  if (e.target === document.getElementById('overlayFerias')) closeFeriasModal();
});

// Botão de trocar usuário
function trocarUsuario() {
  if (!confirm('Trocar de usuário?')) return;
  localStorage.removeItem('escala_pm_user');
  location.reload();
}

// Init
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
iniciarApp();
</script>
